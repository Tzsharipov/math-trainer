<!DOCTYPE html>
<html lang="ru">
<head>
  <script src="/metrika.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Trainer - Деление уголком</title>
  
  <!-- Проверка авторизации -->
  <script>
    // Проверяем залогинен ли пользователь
    if (localStorage.getItem('isLoggedIn') !== 'true') {
      // Не залогинен - редирект на главную
      window.location.href = 'index.html';
    }
  </script>
  
  <style>
    body {
      visibility: hidden;
    }
    body.loaded {
      visibility: visible;
    }
  </style>
</head>
<body>
  <div id="app" class="min-h-screen bg-sky-50 p-2 md:p-6 font-sans text-slate-800 flex items-center justify-center">
  
  <aside id="settingsPanel" class="w-full max-w-sm bg-cyan-400 p-4 rounded-[2.5rem] shadow-xl text-white">
    <h1 class="text-xl font-black mb-3 uppercase tracking-tight text-gray-900 text-center">Деление уголком</h1>
    
    <div class="bg-white/20 rounded-xl p-2 mb-4 font-bold border border-white/30 leading-relaxed text-blue-800 text-center" style="font-size: clamp(11px, 2vw, 14px);">
      Лимиты разрядности:<br>
      Делимое: 3-7 | Делитель: 2-4
    </div>
    
    <!-- Чекбокс подсказок -->
    <div class="mb-4">
      <label class="flex items-center gap-3 p-3 rounded-2xl bg-yellow-400 text-slate-800 cursor-pointer hover:bg-yellow-300 transition-all shadow-md">
        <input type="checkbox" id="checkHints" class="w-5 h-5 accent-blue-600">
        <span class="font-black text-xs uppercase">Включить подсказки</span>
      </label>
    </div>
    
    <div class="flex flex-col gap-2 mb-4 text-sm">
      <label class="flex items-center gap-3 p-3 rounded-2xl bg-white/10 cursor-pointer hover:bg-white/20 transition-all">
        <input type="radio" name="mode" value="auto" checked class="w-4 h-4 accent-blue-600">
        <span class="font-bold text-blue-800">Придумай пример за меня</span>
      </label>
      <label class="flex items-center gap-3 p-3 rounded-2xl bg-white/10 cursor-pointer hover:bg-white/20 transition-all">
        <input type="radio" name="mode" value="manual" class="w-4 h-4 accent-blue-600">
        <span class="font-bold text-blue-800">Я напишу пример сам</span>
      </label>
    </div>
    
    <div id="ui-auto" class="space-y-4">
      <select id="selectDividend" class="w-full p-3 rounded-xl text-slate-800 font-bold outline-none border-none shadow-lg">
        <option value="3">3-значное делимое</option>
        <option value="4">4-значное делимое</option>
        <option value="5" selected>5-значное делимое</option>
        <option value="6">6-значное делимое</option>
        <option value="7">7-значное делимое</option>
      </select>
      <select id="selectDivisor" class="w-full p-3 rounded-xl text-slate-800 font-bold outline-none border-none shadow-lg">
        <option value="2" selected>2-значное делитель</option>
        <option value="3">3-значное делитель</option>
        <option value="4">4-значное делитель</option>
      </select>
      <button id="btnGen" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-xl text-sm active:scale-95 transition-all">
        Создать пример
      </button>
    </div>
    
    <div id="ui-manual" class="space-y-4 hidden text-slate-800">
      <div class="bg-yellow-200 text-yellow-800 text-xs p-2 rounded mb-2">
        ⚠️ Делимое должно делиться на делитель без остатка
      </div>
      <input type="number" id="inDividend" placeholder="Делимое (мин 100)" class="w-full p-3 rounded-xl font-bold outline-none shadow-inner border-2 border-transparent focus:border-green-400">
      <input type="number" id="inDivisor" placeholder="Делитель (мин 10)" class="w-full p-3 rounded-xl font-bold outline-none shadow-inner border-2 border-transparent focus:border-green-400">
      <button id="btnStartMan" class="w-full bg-green-500 hover:bg-green-600 text-white font-black py-4 rounded-xl uppercase text-sm shadow-xl transition-all">
        Начать решать
      </button>
    </div>
    
    <div class="flex gap-3 mt-4">
      <a href="multiplication.html" class="flex-1 bg-purple-500 hover:bg-purple-600 text-white font-black py-3 px-4 rounded-xl shadow-xl text-xs text-center transition-all leading-tight">
        🔢 Перейти<br>к умножению
      </a>
      <a href="app.html" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-black py-3 px-4 rounded-xl shadow-xl text-xs text-center transition-all leading-tight">
        🏠 На стартовую<br>страницу
      </a>
    </div>
  </aside>
  
  <div id="workspace" class="hidden flex-col items-center px-2 md:px-0">
    <h2 class="text-lg md:text-2xl font-bold text-gray-900 tracking-tight mb-3 md:mb-6">Деление уголком</h2>
    
    <div class="bg-white rounded-2xl md:rounded-[3rem] shadow-2xl p-2 md:p-4 border-4 md:border-8 border-white overflow-x-auto">
      <div id="mathGrid" class="font-mono w-fit mx-auto"></div>
    </div>
    
    <div id="checkMessage" class="text-base md:text-xl font-bold text-center mt-2 min-h-[2rem]"></div>
    
    <button id="btnClearAll" class="bg-cyan-400 hover:bg-cyan-500 active:bg-cyan-600 text-blue-800 font-black py-3 px-6 md:py-2 md:px-8 rounded-xl shadow-lg text-sm md:text-base transition-all mt-2 min-w-[140px]">
      Очистить всё
    </button>
    
    <!-- Кнопки навигации -->
    <div class="flex flex-col md:flex-row gap-3 md:gap-4 mt-4 md:mt-6 w-full max-w-md px-4 md:px-0">
      <button id="btnNewExample" class="bg-purple-500 hover:bg-purple-600 active:bg-purple-700 text-white font-black py-4 md:py-3 px-6 md:px-10 rounded-xl shadow-xl text-base md:text-sm transition-all">
        Новый пример
      </button>
      
      <button id="btnBackToSettings" class="bg-green-500 hover:bg-green-600 active:bg-green-700 text-white font-black py-4 md:py-3 px-6 md:px-10 rounded-xl shadow-xl text-base md:text-sm transition-all">
        🏠 Назад к настройкам
      </button>
    </div>
  </div>
  
</div>
  
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script type="module" src="/src/division.js"></script>
</body>
</html>
